<article class="news-card">
  <h3 class="news-card__title">
    <a href="{{detailRoute}}">{{title}}</a>
  </h3>
  <p class="news-card__meta"><em>{{publishedAt}}</em> · {{category}}</p>
  <p class="news-card__detail">{{summary}}</p>
  <a class="news-card__photo" href="{{detailRoute}}">
    <img src="{{coverImage}}" alt="{{title}}">
  </a>
</article>
