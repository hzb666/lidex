<a class="group block no-underline hover:no-underline p-6 bg-white rounded-xl shadow-sm hover:shadow-md transition-[box-shadow,border-color,transform] border border-slate-100 hover:border-slate-200 hover:-translate-y-0.5" href="{{detailRoute}}">
  <div class="flex items-center gap-4 mb-4">
    <div class="w-16 h-16 rounded-full overflow-hidden bg-slate-100 flex-shrink-0">
      <img class="w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-500" src="{{photo}}" alt="{{name}}">
    </div>
    <div>
      <h3 class="font-serif text-lg font-bold text-brand-dark transition-colors decoration-1 underline-offset-4 group-hover:underline">{{name}}</h3>
      <p class="text-xs text-slate-500 font-medium">{{role}} · {{year}}</p>
    </div>
  </div>
  <p class="text-sm text-slate-600 line-clamp-3 leading-relaxed">{{summary}}</p>
</a>
