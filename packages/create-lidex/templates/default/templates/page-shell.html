<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{title}}</title>
  <meta name="description" content="{{description}}">
  <link rel="icon" type="image/svg+xml" href="/assets/public/favicon-static.svg">
  <style data-purpose="custom-styles">
    @font-face {
      font-family: 'Google Sans Flex';
      src: url('/__lidex/theme/fonts/GoogleSansFlex-VariableFont.woff2') format('woff2');
      font-style: normal;
      font-weight: 300 700;
      font-display: swap;
    }

    @font-face {
      font-family: 'Playfair Display';
      src: url('/__lidex/theme/fonts/PlayfairDisplay-VariableFont_wght.woff2') format('woff2');
      font-style: normal;
      font-weight: 400 800;
      font-display: swap;
    }

    :root {
      --font-sans: 'Google Sans Flex', 'SF Pro Text', 'Segoe UI Variable', 'Segoe UI', 'Helvetica Neue', Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei UI', 'Microsoft YaHei', sans-serif;
      --font-serif: 'Playfair Display', 'Iowan Old Style', 'Palatino Linotype', 'Book Antiqua', Baskerville, Georgia, 'Times New Roman', Times, serif;
      --font-mono: 'SF Mono', 'Cascadia Code', 'Cascadia Mono', Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace;
    }

    body {
      font-family: var(--font-sans);
      background-color: #ffffff;
      background-image:
        radial-gradient(circle at 80% 30%, rgba(186, 230, 253, 0.4) 0%, transparent 40%),
        radial-gradient(circle at 20% 70%, rgba(186, 230, 253, 0.2) 0%, transparent 40%);
      background-attachment: fixed;
    }

    :where(h1, h2, h3, h4, h5, h6) {
      font-family: var(--font-serif);
    }

    :where(code, pre, kbd, samp) {
      font-family: var(--font-mono);
    }

    .grid-lines {
      position: relative;
    }
    .grid-lines::before,
    .grid-lines::after {
      content: '';
      position: absolute;
      background-color: rgba(148, 163, 184, 0.2);
    }
    .grid-lines::before {
      top: 0; left: 0; right: 0; height: 1px;
    }
    .grid-lines::after {
      bottom: 0; left: 0; right: 0; height: 1px;
    }

    .grid-col-line {
      position: relative;
    }
    .grid-col-line::after {
      content: '';
      position: absolute;
      top: 0; bottom: 0; right: 0; width: 1px;
      background-color: rgba(148, 163, 184, 0.2);
    }
    .grid-col-line:last-child::after {
      display: none;
    }

    .node {
      position: absolute;
      width: 8px;
      height: 8px;
      background-color: #fff;
      border: 1px solid #cbd5e1;
      border-radius: 50%;
      box-shadow: 0 0 10px 2px rgba(186, 230, 253, 0.6);
    }
    .node-tl { top: -4px; left: -4px; }
    .node-tr { top: -4px; right: -4px; }
    .node-bl { bottom: -4px; left: -4px; }
    .node-br { bottom: -4px; right: -4px; }

    .markdown-wrap {
      scroll-margin-top: 64px;
    }

    body {
      font-size: 16px;
    }

    body .text-xs,
    body .text-sm {
      font-size: 1rem !important;
      line-height: 1.6 !important;
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 40;
      width: 100%;
    }

    .site-header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: transparent;
      border-bottom: 1px solid transparent;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
      pointer-events: none;
      transition: background-color 0.18s ease, border-color 0.18s ease, backdrop-filter 0.18s ease, -webkit-backdrop-filter 0.18s ease;
    }

    body.is-scrolled .site-header::before,
    body.nav-open .site-header::before {
      background: rgba(255, 255, 255, 0.78);
      border-bottom-color: rgba(226, 232, 240, 0.9);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .site-header__inner {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      min-height: 68px;
    }

    .hero {
      width: 100%;
      padding-top: 3rem;
    }

    .hero--text-only {
      padding-bottom: 0;
    }

    .hero--has-visual {
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(280px, 0.95fr);
      gap: 3rem;
      align-items: center;
      padding-bottom: 1rem;
    }

    .hero-copy {
      width: 100%;
      max-width: 48rem;
    }

    .hero-title {
      margin: 0 0 1rem;
      font-family: var(--font-serif);
      font-size: clamp(2.5rem, 5.5vw, 3.75rem);
      font-weight: 700;
      line-height: 1.05;
      letter-spacing: -0.045em;
      color: #1e293b;
    }

    .hero-lead {
      margin: 0;
      max-width: 38rem;
      color: #475569;
      font-size: 1.125rem;
      line-height: 1.75;
    }

    .hero-meta {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 1rem;
      margin-top: 1.5rem;
    }

    .hero-action {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 2.9rem;
      padding: 0.75rem 1.3rem;
      border-radius: 999px;
      border: 1px solid rgba(15, 23, 42, 0.14);
      background: rgba(15, 23, 42, 0.96);
      color: #f8fafc;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.01em;
      text-decoration: none;
      box-shadow: 0 16px 30px -24px rgba(15, 23, 42, 0.72);
      transition: transform 0.18s ease, box-shadow 0.18s ease, background-color 0.18s ease;
    }

    .hero-action:hover {
      background: #1e293b;
      color: #ffffff;
      text-decoration: none;
      transform: translateY(-1px);
      box-shadow: 0 22px 34px -24px rgba(15, 23, 42, 0.7);
    }

    .hero-command {
      display: inline-flex;
      align-items: center;
      gap: 0.85rem;
      min-height: 2.9rem;
      padding: 0.5rem 0 0.5rem 1rem;
      border-top: 1px solid rgba(203, 213, 225, 0.82);
      border-bottom: 1px solid rgba(203, 213, 225, 0.82);
      background: transparent;
    }

    .hero-command__label {
      color: #94a3b8;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .hero-command__code {
      color: #0f172a;
      font-size: 0.98rem;
      font-weight: 400;
      white-space: nowrap;
    }

    .hero-command__copy {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 2.4rem;
      padding: 0.5rem 0.95rem;
      border: 0;
      border-left: 1px solid rgba(203, 213, 225, 0.82);
      background: transparent;
      color: #475569;
      font-size: 0.96rem;
      font-weight: 600;
      transition: color 0.18s ease, background-color 0.18s ease;
    }

    .hero-command__copy:hover {
      background: rgba(248, 250, 252, 0.92);
      color: #0f172a;
    }

    .hero-command__copy.is-copied {
      color: #0f172a;
    }

    .hero-visual {
      position: relative;
      width: 100%;
      aspect-ratio: 4 / 3;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hero-visual img {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 1rem;
      box-shadow: 0 24px 48px -32px rgba(15, 23, 42, 0.32);
    }

    body[data-route="/"] {
      --home-stage-pt: clamp(3.7rem, 10svh, 6rem);
      --home-stage-pb: clamp(1.4rem, 3.8svh, 2.8rem);
      --home-stage-gap: clamp(2rem, 5.2svh, 4.4rem);
      --home-stage-scroll-min-height: 820px;
    }

    body[data-route="/"] .hero--home {
      padding-top: var(--home-stage-pt);
    }

    body[data-route="/"] .hero--home .hero-copy {
      max-width: min(52rem, 100%);
    }

    body[data-route="/"] .hero--home .hero-title {
      max-width: 16ch;
      margin-bottom: 1.1rem;
      font-size: clamp(3rem, 7vw, 4.5rem);
      line-height: 1.02;
    }

    body[data-route="/"] main {
      justify-content: flex-start;
    }

    body[data-route="/"] .feature-grid-wrapper {
      position: relative;
      left: 50%;
      width: min(calc(100vw - 3rem), 88rem);
      max-width: none;
      transform: translateX(-50%);
      margin-top: var(--home-stage-gap);
    }

    body[data-route="/"] .feature-grid-wrapper .grid-lines {
      padding-top: clamp(0.75rem, 2vh, 1.5rem);
      padding-bottom: clamp(0.75rem, 2vh, 1.5rem);
      padding-left: 0.25rem;
      padding-right: 0.25rem;
    }

    body[data-route="/"] .markdown-wrap {
      padding-top: 0;
      padding-bottom: var(--home-stage-pb);
    }

    body[data-route="/"] .query-block {
      margin-top: clamp(5.5rem, 13vh, 11rem);
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-left: auto;
    }

    .site-nav {
      display: flex;
      align-items: center;
      gap: 24px;
      font-size: 1rem !important;
    }

    .brand-link {
      text-decoration: none;
    }

    .brand-link:hover {
      text-decoration: none;
    }

    .brand-mark {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-logo {
      width: 36px;
      height: 36px;
      object-fit: contain;
      flex: 0 0 auto;
    }

    .brand-copy {
      display: flex;
      flex-direction: column;
      min-width: 0;
      line-height: 1.02;
    }

    .brand-title {
      font-family: var(--font-serif);
      font-size: 1.7rem;
      font-weight: 700;
      letter-spacing: -0.04em;
      color: #0f172a;
    }

    .nav-toggle {
      display: none;
      width: 38px;
      height: 38px;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      border: 1px solid rgba(203, 213, 225, 0.9);
      background: rgba(255, 255, 255, 0.92);
      color: #0f172a;
      box-shadow: 0 12px 24px -18px rgba(15, 23, 42, 0.4);
      transition: border-color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
    }

    .nav-toggle:hover {
      border-color: rgba(148, 163, 184, 0.95);
      box-shadow: 0 16px 28px -18px rgba(15, 23, 42, 0.32);
      transform: translateY(-1px);
    }

    .nav-toggle__bars {
      display: inline-flex;
      flex-direction: column;
      gap: 4px;
    }

    .nav-toggle__bars span {
      display: block;
      width: 17px;
      height: 2px;
      border-radius: 999px;
      background: currentColor;
    }

    .site-nav__link {
      position: relative;
      padding: 0.2rem 0 0.55rem;
      color: #475569;
      text-decoration: none;
      transition: color 0.18s ease;
    }

    .site-nav__link::after {
      content: '';
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 2px;
      border-radius: 999px;
      background: #0f172a;
      opacity: 0;
      transform: scaleX(0.35);
      transform-origin: left center;
      transition: transform 0.18s ease, opacity 0.18s ease;
    }

    .site-nav__link:hover,
    .site-nav__link.is-active {
      color: #0f172a;
    }

    .site-nav__link:hover::after,
    .site-nav__link.is-active::after {
      opacity: 1;
      transform: scaleX(1);
    }

    .site-nav__link.is-active {
      font-weight: 700;
    }

    .hero-eyebrow-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: nowrap;
      min-width: 0;
    }

    .eyebrow {
      color: #94a3b8;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .detail-pagination-controls {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      flex: 0 0 auto;
    }

    .detail-pagination-control {
      width: 1.9rem;
      height: 1.9rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.05rem;
      font-weight: 700;
      line-height: 1;
      border-radius: 999px;
      border: 1px solid transparent;
      background: transparent;
      color: #64748b;
      box-shadow: none;
      text-decoration: none;
      transition: border-color 0.18s ease, color 0.18s ease, background-color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
    }

    .detail-pagination-control:not(.is-disabled):hover {
      border-color: rgba(226, 232, 240, 0.95);
      background: rgba(255, 255, 255, 0.88);
      color: #334155;
      box-shadow: 0 12px 24px -18px rgba(15, 23, 42, 0.28);
      transform: translateY(-1px);
      text-decoration: none;
    }

    .detail-pagination-control.is-disabled {
      opacity: 0.45;
      pointer-events: none;
    }

    .nav-backdrop {
      position: fixed;
      inset: 0;
      z-index: 32;
      background: rgba(15, 23, 42, 0.18);
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s ease;
    }

    body.nav-open {
      overflow: hidden;
    }

    .scroll-hint {
      position: fixed;
      right: 80px;
      bottom: 52px;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
      z-index: 24;
      color: #64748b;
      font-size: 16px;
      font-weight: 500;
    }
    .scroll-hint.visible {
      opacity: 0.9;
    }
    .scroll-hint__arrow {
      width: 14px;
      height: 14px;
      display: block;
      border-right: 1.5px solid currentColor;
      border-bottom: 1.5px solid currentColor;
      transform: rotate(45deg);
      animation: bounce 2s ease-in-out infinite;
    }
    @keyframes bounce {
      0%,
      100% {
        transform: translateY(0) rotate(45deg);
      }

      50% {
        transform: translateY(6px) rotate(45deg);
      }
    }

    .footer-note {
      font-size: 0.875rem;
      font-weight: 500;
      letter-spacing: 0.02em;
      color: #64748b;
    }

    [data-purpose="site-footer"] nav {
      font-size: 1rem !important;
    }

    [data-purpose="site-footer"] a {
      color: inherit;
      text-decoration: none;
    }

    [data-purpose="site-footer"] a:hover {
      color: #1e293b;
      text-decoration: none;
    }

    @media (max-width: 1024px) {
      body[data-route="/"] .feature-grid-wrapper {
        left: auto;
        width: 100%;
        transform: none;
      }
    }

    @media (max-width: 767px) {
      .brand-title {
        font-size: 1.45rem;
      }

      .hero-eyebrow-row {
        gap: 8px;
      }
    }

    @media (max-width: 860px) {
      .site-header__inner {
        min-height: 62px;
      }

      body[data-route="/"] {
        --home-stage-pt: clamp(3rem, 9svw, 4.6rem);
        --home-stage-pb: clamp(1rem, 3.5svw, 1.75rem);
        --home-stage-gap: clamp(1.8rem, 5svw, 3rem);
      }

      body[data-route="/"] .hero--home {
        padding-top: var(--home-stage-pt);
      }

      body[data-route="/"] .feature-grid-wrapper {
        margin-top: var(--home-stage-gap);
      }

      .nav-toggle {
        display: inline-flex;
      }

      #site-nav {
        position: fixed;
        top: 68px;
        right: 14px;
        z-index: 34;
        display: none;
        flex-direction: column;
        align-items: stretch;
        gap: 4px;
        min-width: min(280px, calc(100vw - 28px));
        padding: 10px;
        border: 1px solid rgba(226, 232, 240, 0.96);
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.98);
        box-shadow:
          0 26px 46px -24px rgba(15, 23, 42, 0.34),
          0 10px 20px -18px rgba(15, 23, 42, 0.26);
      }

      body.nav-open #site-nav {
        display: flex !important;
      }

      body.nav-open .nav-backdrop {
        opacity: 1;
        pointer-events: auto;
      }

      .site-nav__link {
        padding: 0.85rem 0.95rem;
        border-radius: 14px;
      }

      .site-nav__link::after {
        display: none;
      }

      .site-nav__link:hover,
      .site-nav__link.is-active {
        background: rgba(248, 250, 252, 0.98);
      }

    }

    @media (min-width: 981px) {
      body[data-route="/"].home-stage-scroll-ready main {
        min-height: calc(100svh - 68px);
      }

      body[data-route="/"].home-stage-scroll-ready .scroll-hint {
        display: flex;
      }
    }

    @media (max-width: 767px) {
      body[data-route="/"] .hero--home .hero-title {
        max-width: 12ch;
      }

      body[data-route="/"] .hero--home .hero-lead {
        max-width: 100%;
      }

      body[data-route="/"] .hero--home .hero-meta {
        gap: 0.8rem;
        margin-top: 1.25rem;
      }

      body[data-route="/"] .hero-command {
        width: 100%;
        flex-wrap: wrap;
        align-items: flex-start;
        gap: 0.55rem 0.8rem;
        padding: 0.65rem 0 0.65rem 0.9rem;
      }

      body[data-route="/"] .hero-command__copy {
        padding-left: 0;
        padding-right: 0;
        border-left: 0;
      }

      body[data-route="/"] .feature-grid-list {
        grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
        gap: 1rem !important;
      }

      body[data-route="/"] .feature-grid-wrapper .grid-col-line {
        padding-right: 0;
        margin-bottom: 0 !important;
      }

      body[data-route="/"] .feature-grid-wrapper .grid-col-line::after {
        display: none;
      }
    }
  </style>
  {{{themeStylesheetsHtml}}}
</head>
<body class="font-sans text-slate-800 antialiased min-h-screen flex flex-col relative overflow-x-hidden" data-page="{{pageKey}}" data-route="{{pageRoute}}">
  <header class="site-header" data-purpose="site-header">
    <div class="site-header__inner max-w-7xl mx-auto px-6 md:px-12">
      <a href="/" class="brand-link flex items-center min-w-0 hover:opacity-90 transition-opacity" aria-label="Lidex home">
        <span class="brand-mark">
          <img class="brand-logo loaded" src="/assets/public/favicon.svg" alt="{{siteName}} logo" loading="eager" decoding="async" width="36" height="36">
          <span class="brand-copy">
            <span class="brand-title">{{siteName}}</span>
          </span>
        </span>
      </a>
      <div class="header-actions">
        <button class="nav-toggle" id="nav-toggle" type="button" aria-expanded="false" aria-controls="site-nav" aria-label="Open navigation">
          <span class="nav-toggle__bars">
            <span></span>
            <span></span>
            <span></span>
          </span>
        </button>
        <nav class="site-nav font-medium text-sm" id="site-nav">
          <a class="site-nav__link" href="/">Home</a>
          <a class="site-nav__link" href="/docs">Docs</a>
          <a class="site-nav__link" href="/design">Design</a>
          <a class="site-nav__link" href="/blocks">Blocks</a>
          <a class="site-nav__link" href="/details">Details</a>
          <a class="site-nav__link" href="/queries">Queries</a>
          <a class="site-nav__link" href="/theme">Theme</a>
        </nav>
      </div>
    </div>
  </header>
  <div class="nav-backdrop" id="nav-backdrop"></div>

  <main class="flex-grow flex flex-col items-center justify-center relative z-10 w-full max-w-7xl mx-auto px-6 md:px-12">
    {{{pageHeaderHtml}}}
    <section class="markdown-wrap w-full max-w-4xl mx-auto py-8">
      <article class="markdown-body prose prose-slate max-w-none">
        {{{contentHtml}}}
      </article>
    </section>
  </main>

  <footer class="w-full px-6 py-8 md:px-12 mt-auto z-10 relative max-w-7xl mx-auto flex flex-col md:flex-row items-center justify-between border-t border-slate-100" data-purpose="site-footer">
    <nav class="flex space-x-6 text-sm font-medium text-slate-600 mb-4 md:mb-0">
      <a class="hover:text-brand-dark transition-colors" href="/">Home</a>
      <a class="hover:text-brand-dark transition-colors" href="/docs">Docs</a>
      <a class="hover:text-brand-dark transition-colors" href="/design">Design</a>
      <a class="hover:text-brand-dark transition-colors" href="/blocks">Blocks</a>
      <a class="hover:text-brand-dark transition-colors" href="/details">Details</a>
      <a class="hover:text-brand-dark transition-colors" href="/queries">Queries</a>
      <a class="hover:text-brand-dark transition-colors" href="/theme">Theme</a>
    </nav>
    <span class="footer-note">{{footerText}}</span>
  </footer>

  <div class="scroll-hint" aria-hidden="true">
    <span>Scroll</span>
    <span class="scroll-hint__arrow"></span>
  </div>

  <div id="photo-lightbox" aria-hidden="true" class="fixed inset-0 z-50 bg-black/90 hidden items-center justify-center">
    <img id="lightbox-img" alt="" class="max-w-full max-h-full object-contain">
  </div>

  {{{themeScriptHtml}}}
</body>
</html>
