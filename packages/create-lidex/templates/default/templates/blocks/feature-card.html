<a class="member-card member-card--feature" href="{{detailRoute}}">
  <span class="member-card__figure">FIG 0.{{_page_}}</span>
  <div class="member-card__illustration">
    <img class="member-card__illustration-image loaded" src="{{coverImage}}" alt="" loading="lazy" decoding="async">
  </div>
  <div class="member-card__body">
    <p class="member-card__eyebrow">{{kicker}}</p>
    <h3 class="member-card__name">{{title}}</h3>
    <p class="member-card__summary">{{summary}}</p>
  </div>
</a>
