<article class="accordion-item border-b border-slate-200 last:border-b-0 py-4">
  <button
    class="accordion-item__trigger w-full flex items-center justify-between text-left group focus:outline-none"
    type="button"
    aria-expanded="false"
    aria-controls="accordion-panel-{{sourceLine}}">
    <span class="flex flex-col pr-8">
      <span class="font-serif text-xl font-bold text-brand-dark mb-1 group-hover:text-slate-600 transition-colors">{{title}}</span>
      <span class="text-sm text-slate-500 font-medium">{{summary}}</span>
    </span>
    <span class="accordion-item__icon flex-shrink-0 w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center text-slate-600 group-hover:bg-slate-200 transition-colors" aria-hidden="true">+</span>
  </button>
  <div class="accordion-item__panel mt-4 text-slate-600 leading-relaxed text-sm" id="accordion-panel-{{sourceLine}}" hidden>
    <p>{{body}}</p>
  </div>
</article>
