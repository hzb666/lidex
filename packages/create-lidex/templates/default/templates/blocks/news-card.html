<article class="group relative bg-white p-6 rounded-xl shadow-sm border border-slate-100 hover:shadow-md transition-shadow flex flex-col md:flex-row gap-6">
  <div class="flex-1">
    <p class="text-xs font-medium text-slate-500 mb-2">{{publishedAt}} · {{category}}</p>
    <h3 class="font-serif text-xl font-bold text-brand-dark mb-3">
      <a class="before:absolute before:inset-0 hover:text-slate-600 transition-colors" href="{{detailRoute}}">{{title}}</a>
    </h3>
    <p class="text-sm text-slate-600 leading-relaxed line-clamp-3">{{summary}}</p>
  </div>
  <div class="w-full md:w-48 aspect-video md:aspect-square flex-shrink-0 overflow-hidden rounded-lg bg-slate-100">
    <img class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" src="{{coverImage}}" alt="{{title}}">
  </div>
</article>
