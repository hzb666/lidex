<section class="detail-copy">
  <div class="detail-meta">
    <span>{{role}}</span>
    <span>{{year}}</span>
  </div>
  <p class="detail-summary">{{summary}}</p>
  <div class="detail-fields">
    <div class="detail-field">
      <h2>Focus</h2>
      <p>{{focus}}</p>
    </div>
    <div class="detail-field">
      <h2>Email</h2>
      <p><a class="detail-email" href="mailto:{{email}}">{{email}}</a></p>
    </div>
  </div>
  <div class="detail-rich">
    {{{bodyHtml}}}
  </div>
</section>
